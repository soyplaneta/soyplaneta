<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Proyectos de Fundación Soy Planeta." />
    <title data-i18n="projects.pageTitle">Proyectos · Soy Planeta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Montserrat:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <a class="skip-link" href="#contenido">Saltar al contenido</a>

    <header class="site-header" id="site-header"></header>

    <main id="contenido">
      <section class="projects-watermark section" style="padding-top: 3rem">
        <div class="container">
          <h1 class="page-title" data-i18n="projects.pageTitle">Proyectos</h1>

          <div class="project-grid project-grid--stagger">
            <!-- Orden como en el sitio: Eco | ConectaFuturo | Guardianes | Generación Planeta -->
            <!-- Coloque los PDF en assets/files/ (mismos nombres que abajo) o cambie los href -->
            <article class="project-card">
              <div class="project-card__logo">
                <img src="assets/images/projects-logo.jpeg" alt="" width="160" height="160" loading="lazy" />
              </div>
              <div class="project-card__body">
                <h2 style="margin: 0 0 0.35rem; color: var(--orange)" data-i18n="projects.ecoTitle">ECO CHALLENGE 2026</h2>
                <p style="margin: 0 0 1rem; color: var(--muted)" data-i18n="projects.ecoSub"></p>
                <a
                  class="btn btn--orange"
                  href="https://docs.google.com/forms/d/e/1FAIpQLSc-vrLfT-oIs4RMTI7Sh-bmor1U1Q1RTTEEd2baCuv5dCFCgA/viewform"
                  target="_blank"
                  rel="noopener noreferrer"
                  data-i18n="projects.ecoCta"
                  >Inscríbete</a>
              </div>
            </article>

            <article class="project-card">
              <div class="project-card__logo">
                <img src="assets/images/projects-conecta.jpg" alt="" width="160" height="160" loading="lazy" />
              </div>
              <div class="project-card__body">
                <h2 style="margin: 0 0 0.75rem" data-i18n="projects.conectaTitle">ConectaFuturo</h2>
                <p style="margin: 0 0 1rem; color: var(--muted)" data-i18n="projects.conectaText"></p>
                <a
                  class="btn btn--dark"
                  href="https://api.whatsapp.com/send/?phone=3193836741&amp;text=Gracias%21+Bienvenido+al+%C3%BAnico+programa+de+orientaci%C3%B3n+profesional+para+la+sostenibilidad&amp;type=phone_number&amp;app_absent=0"
                  target="_blank"
                  rel="noopener noreferrer"
                  data-i18n="projects.conectaCta"
                  >Quiero participar</a>
              </div>
            </article>

            <article class="project-card">
              <div class="project-card__logo">
                <img src="assets/images/projects-marea.png" alt="" width="160" height="160" loading="lazy" />
              </div>
              <div class="project-card__body">
                <h2 style="margin: 0 0 0.75rem" data-i18n="projects.mareaTitle">Guardianes de la marea</h2>
                <p style="margin: 0 0 1rem; color: var(--muted)" data-i18n="projects.mareaText"></p>
                <a
                  class="btn btn--dark"
                  href="https://api.whatsapp.com/send/?phone=3193836741&amp;text=Gracias%21+Bienvenido+al+%C3%BAnico+programa+de+orientaci%C3%B3n+profesional+para+la+sostenibilidad&amp;type=phone_number&amp;app_absent=0"
                  target="_blank"
                  rel="noopener noreferrer"
                  data-i18n="projects.mareaCta"
                  >Participa</a>
              </div>
            </article>

            <article class="project-card">
              <div class="project-card__logo">
                <img src="assets/images/project-gen.jpeg" alt="" width="160" height="160" loading="lazy" />
              </div>
              <div class="project-card__body">
                <h2 style="margin: 0 0 0.75rem" data-i18n="projects.genTitle">Generación Planeta</h2>
                <p style="margin: 0 0 1rem; color: var(--muted)" data-i18n="projects.genText"></p>
                <a
                  class="btn btn--dark"
                  href="https://api.whatsapp.com/send/?phone=3193836741&amp;text=Gracias%21+Bienvenido+al+%C3%BAnico+programa+de+orientaci%C3%B3n+profesional+para+la+sostenibilidad&amp;type=phone_number&amp;app_absent=0"
                  target="_blank"
                  rel="noopener noreferrer"
                  data-i18n="projects.genCta"
                  >Infórmate</a>
              </div>
            </article>
          </div>
        </div>
      </section>

      <section class="impact impact--stats impact-banner" aria-labelledby="impact-banner-heading">
        <div class="container impact-banner__grid">
          <div class="impact-banner__col impact-banner__col--current">
            <h2 id="impact-banner-heading" class="impact-banner__title">
              <span class="impact-banner__title-line" data-i18n="projects.impactYearTitle">Impacto</span>
              <span class="impact-banner__title-line" data-i18n="projects.impactYearRange">2024 – 2025</span>
            </h2>
            <div class="impact-banner__gauge">
              <svg class="impact-banner__gauge-svg" viewBox="0 0 200 108" focusable="false" aria-hidden="true">
                <path
                  class="impact-banner__arc-track"
                  d="M 20 96 A 80 80 0 0 1 180 96"
                  fill="none"
                  stroke="rgba(255,255,255,0.2)"
                  stroke-width="5"
                  stroke-linecap="round"
                  pathLength="100"
                />
                <path
                  class="impact-banner__arc-progress"
                  d="M 20 96 A 80 80 0 0 1 180 96"
                  fill="none"
                  stroke="#ffffff"
                  stroke-width="5"
                  stroke-linecap="round"
                  pathLength="100"
                  stroke-dasharray="37 100"
                />
              </svg>
              <div class="impact-banner__gauge-copy">
                <div class="impact-banner__stat" data-i18n="projects.impactNumber">1850</div>
                <p class="impact-banner__stat-sub" data-i18n="projects.impactAudience"></p>
              </div>
            </div>
            <p class="impact-banner__cities" data-i18n="projects.impactCities"></p>
          </div>
          <div class="impact-banner__col impact-banner__col--goal">
            <p class="impact-banner__goal-heading" data-i18n="projects.impactGoalTitle">Meta a 2030</p>
            <div class="impact-banner__goal-body">
              <span class="impact-banner__goal-num" data-i18n="projects.impactGoalNumber">5.000</span>
              <span class="impact-banner__goal-line impact-banner__goal-line--accent" data-i18n="projects.impactGoalLine1"></span>
              <span class="impact-banner__goal-line impact-banner__goal-line--accent" data-i18n="projects.impactGoalLine2"></span>
            </div>
          </div>
        </div>
      </section>

      <section class="partners-showcase" aria-labelledby="partners-showcase-title">
        <div class="container partners-showcase__layout">
          <div class="partners-card partners-card--showcase">
            <h2 id="partners-showcase-title" class="partners-card__title" data-i18n="projects.partnersTitle">
              Colegios, instituciones y entidades participantes 2024–2025
            </h2>

            <div class="partners-card__logos">
              <img
                src="assets/images/partners/logos.png"
                alt=""
                width="768"
                height="300"
                loading="lazy"
              />
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer" id="site-footer"></footer>

    <script src="js/config.js" defer></script>
    <script src="js/includes.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <script src="js/main.js" defer></script>
  </body>
</html>
