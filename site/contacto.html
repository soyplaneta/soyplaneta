<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Contacto — Fundación Soy Planeta." />
    <title data-i18n="contact.pageTitle">Contacto · Soy Planeta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Montserrat:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <a class="skip-link" href="#contenido">Saltar al contenido</a>

    <header class="site-header" id="site-header"></header>

    <main id="contenido">
      <section class="section">
        <div class="container" style="max-width: 820px">
          <h1 class="page-title" data-i18n="contact.pageTitle">Contacto</h1>
          <p style="text-align: center; color: var(--muted)" data-i18n="contact.lead"></p>
          <div style="text-align: center; margin-top: 1.25rem">
            <a class="btn btn--orange" href="mailto:luzhelena@soyplaneta.org" data-i18n="contact.emailUs">Escríbenos</a>
          </div>

          <div class="map-grid" style="margin-top: 2.5rem">
            <div class="prose">
              <h2 style="margin-bottom: 0.5rem" data-i18n="footer.contactTitle"></h2>
              <p><a href="tel:+573193836741"><span data-i18n="footer.phone"></span></a></p>
              <p><a href="mailto:luzhelena@soyplaneta.org"><span data-i18n="footer.email"></span></a></p>
              <p>
                <a href="https://www.instagram.com/soyplanetaorg.co/" target="_blank" rel="noopener noreferrer">
                  <span data-i18n="footer.instagramHandle"></span>
                </a>
              </p>
            </div>
            <div>
              <iframe
                class="map-frame"
                title="Mapa"
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
                src="https://maps.google.com/maps?q=Cl.+152a+%2346-15%2C+Bogot%C3%A1%2C+Colombia&hl=es&z=16&output=embed"
              ></iframe>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer" id="site-footer"></footer>

    <script src="js/config.js" defer></script>
    <script src="js/includes.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <script src="js/main.js" defer></script>
  </body>
</html>
